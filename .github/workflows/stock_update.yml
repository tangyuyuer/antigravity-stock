name: Update Stock Data

on:
  schedule:
    # Runs every 10 minutes from 1:00 to 7:00 UTC (which is 9:00 to 15:00 Beijing time) on Monday-Friday
    - cron: '*/10 1-7 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd stock-app
          npm install axios iconv-lite
        
      - name: Run data fetcher script
        run: |
          cd stock-app
          node scripts/update_data.js
        
      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stock-app/public/data/market.json
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update market data"
            git push
          fi
